{% extends 'base.html' %}
{% block content %}
<section class="card">
  <h2>PDV - Venda Rápida</h2>

  <div class="inline">
    <input id="product-search" placeholder="Buscar produto por nome" autocomplete="off">
  </div>

  <form method="post">
    <div class="product-list-window">
      <table>
        <tr><th></th><th>Produto</th><th>Preço</th><th>Estoque</th><th>Qtd</th></tr>
        {% for p in products %}
        <tr data-product-row data-name="{{ p['name']|lower }}" data-price="{{ '%.2f'|format(p['sale_price']) }}" class="{{ 'stock-zero' if p['stock_qty'] == 0 else '' }}">
          <td>
            <input type="checkbox" {% if p['stock_qty'] == 0 %}disabled{% endif %} onchange="toggleQty(this)">
          </td>
          <td>{{ p['name'] }} {% if p['stock_qty'] == 0 %}<b>(ZERADO)</b>{% endif %}</td>
          <td>R$ {{ '%.2f'|format(p['sale_price']) }}</td>
          <td>{{ p['stock_qty'] }}</td>
          <td>
            <input type="hidden" name="product_id" value="{{ p['id'] }}">
            <input class="qty" type="number" name="quantity" min="0" max="{{ p['stock_qty'] }}" value="0" readonly>
          </td>
        </tr>
        {% endfor %}
      </table>
    </div>
    <label>Forma de pagamento
      <select name="payment_method">{% for pm in payment_methods %}<option value="{{ pm }}">{{ pm }}</option>{% endfor %}</select>
    </label>
    <label>Desconto<input type="number" step="0.01" name="discount" value="0"></label>
    <p class="pdv-total-line">Total selecionado: <strong id="pdv-selected-total">R$ 0,00</strong></p>
    <button type="submit">Finalizar venda</button>
  </form>
</section>

<script>
  const searchInput = document.getElementById('product-search');
  const rows = Array.from(document.querySelectorAll('[data-product-row]'));

  searchInput.addEventListener('input', () => {
    const term = searchInput.value.trim().toLowerCase();
    rows.forEach((row) => {
      const name = row.dataset.name || '';
      row.style.display = name.includes(term) ? '' : 'none';
    });
  });

  const totalEl = document.getElementById('pdv-selected-total');

  const toggleQty = (checkbox) => {
    const qtyInput = checkbox.closest('tr').querySelector('.qty');
    qtyInput.readOnly = !checkbox.checked;
    if (!checkbox.checked) qtyInput.value = 0;
    updateSelectedTotal();
  };
  const qtyInputs = Array.from(document.querySelectorAll('.qty'));
  const checkboxes = Array.from(document.querySelectorAll('[data-product-row] input[type="checkbox"]'));

  const updateSelectedTotal = () => {
    let total = 0;
    rows.forEach((row) => {
      if (row.style.display == 'none') return;
      const checkbox = row.querySelector('input[type="checkbox"]');
      const qty = Number(row.querySelector('.qty').value || 0);
      const price = Number((row.dataset.price || '0').replace(',', '.')) || 0;
      if (checkbox && checkbox.checked && qty > 0) total += qty * price;
    });
    totalEl.textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
  };

  qtyInputs.forEach((i) => i.addEventListener('input', updateSelectedTotal));
  checkboxes.forEach((c) => c.addEventListener('change', updateSelectedTotal));
  searchInput.addEventListener('input', () => setTimeout(updateSelectedTotal, 0));
  updateSelectedTotal();
</script>
{% endblock %}
